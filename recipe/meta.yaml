{% set name = "aio-pika" %}
{% set version = "9.6.2" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:

  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name.replace('-', '_') }}-{{ version }}.tar.gz
  sha256: c49e9246080dc8ffa1bb0e4aca407bf3d8ad78c3ee3a93df88b68fe65d7a49b9

build:
  number: 0
  noarch: python
  script: {{ PYTHON }} -m pip install . -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
    - uv-build
  run:
    - python >={{ python_min }}
    - aiormq >=6.8,<7
    - yarl
    - exceptiongroup >=1.0.0,<2.0.0
    - typing_extensions

test:
  requires:
    - python {{ python_min }}
    - pip
  imports:
    - aio_pika
  commands:
    - pip check

about:
  home: https://github.com/mosquito/aio-pika
  license: Apache-2.0
  license_family: Apache
  license_file: LICENSE
  summary: aio-pika is a pure python AMQP client library
  description: |
    aio-pika is a pure python AMQP client library
  doc_url: https://github.com/mosquito/aio-pika
  dev_url: https://github.com/mosquito/aio-pika

extra:
  recipe-maintainers:
    - akrherz
    - gregfreeman
